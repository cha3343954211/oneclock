name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 支持手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. 安装 Node 依赖
      - name: Install Node dependencies
        run: npm ci

      # 4. 构建 Web 资源并同步到 iOS
      - name: Build web & sync Capacitor iOS
        run: npm run build:cap

      # 5. 安装 CocoaPods 依赖
      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install --repo-update

      # 6. Archive（归档，不签名）
      - name: Archive iOS app (unsigned)
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/ZenClock.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | xcpretty || true

      # 7. 手动打包为 IPA（无需签名导出）
      - name: Package IPA from archive
        run: |
          APP_PATH=$(find $RUNNER_TEMP/ZenClock.xcarchive/Products -name "*.app" | head -1)
          mkdir -p $RUNNER_TEMP/Payload
          cp -r "$APP_PATH" $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r ZenClock-unsigned.ipa Payload/
          echo "IPA created at: $RUNNER_TEMP/ZenClock-unsigned.ipa"

      # 8. 上传 IPA 为 Artifact（保留 14 天）
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZenClock-iOS-unsigned
          path: ${{ runner.temp }}/ZenClock-unsigned.ipa
          retention-days: 14

      # 9. 显示构建信息
      - name: Build summary
        run: |
          echo "## ✅ Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**下载 IPA 后，使用 Sideloadly 安装到设备：**" >> $GITHUB_STEP_SUMMARY
          echo "1. 下载上方 Artifact: \`ZenClock-iOS-unsigned.ipa\`" >> $GITHUB_STEP_SUMMARY
          echo "2. 打开 [Sideloadly](https://sideloadly.io) (Windows/Mac 均可)" >> $GITHUB_STEP_SUMMARY
          echo "3. 连接 iPhone/iPad，拖入 IPA，用免费 Apple ID 签名" >> $GITHUB_STEP_SUMMARY
          echo "4. 安装完成后在 设置→通用→VPN与设备管理 信任证书" >> $GITHUB_STEP_SUMMARY
